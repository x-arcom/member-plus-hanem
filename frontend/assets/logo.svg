<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D98EF7"/>
      <stop offset="35%" stop-color="#BE52EF"/>
      <stop offset="70%" stop-color="#9B30D9"/>
      <stop offset="100%" stop-color="#7B2DA8"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0D8D0"/>
      <stop offset="50%" stop-color="#B0A898"/>
      <stop offset="100%" stop-color="#C8C0B8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Diamond body -->
  <polygon points="32,6 56,28 32,58 8,28" fill="url(#gem)"/>
  <!-- Diamond facet lines -->
  <polygon points="32,6 42,28 32,58 22,28" fill="rgba(255,255,255,0.12)"/>
  <line x1="8" y1="28" x2="56" y2="28" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <!-- Top shine -->
  <polygon points="32,6 42,20 32,28 22,20" fill="url(#shine)"/>
  <!-- Silver ring (ellipse) -->
  <ellipse cx="32" cy="32" rx="28" ry="10" fill="none" stroke="url(#ring)" stroke-width="3.5" transform="rotate(-15 32 32)"/>
  <!-- White plus mark -->
  <rect x="39" y="10" width="11" height="3.5" rx="1.5" fill="#fff" transform="rotate(0)"/>
  <rect x="43" y="6" width="3.5" height="11" rx="1.5" fill="#fff"/>
  <!-- Plus border for visibility -->
  <rect x="39" y="10" width="11" height="3.5" rx="1.5" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>
  <rect x="43" y="6" width="3.5" height="11" rx="1.5" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>
</svg>
