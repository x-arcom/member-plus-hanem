<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الهدية الشهرية — Member Plus</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .summary-row { display: flex; gap: var(--space-3); margin-bottom: var(--space-6); }
        .summary-item { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); flex: 1; text-align: center; }
        .summary-item__value { font-family: var(--font-display); font-size: var(--font-size-xl); font-weight: 700; color: var(--c-purple); }
        .summary-item__label { font-size: var(--font-size-xs); color: var(--color-text-secondary); margin-top: 2px; }
        @media (max-width: 480px) { .summary-row { flex-wrap: wrap; } .summary-item { flex: 1 1 calc(50% - var(--space-3)); } }

        .gift-tabs { display: flex; gap: 0; margin-bottom: var(--space-5); border-bottom: 2px solid var(--color-border); }
        .gift-tab { background: transparent; border: none; font: inherit; font-size: var(--font-size-sm); color: var(--color-text-secondary); cursor: pointer; padding: var(--space-3) var(--space-5); position: relative; transition: color var(--motion-fast); }
        .gift-tab--active { color: var(--c-purple); font-weight: var(--font-weight-semibold); }
        .gift-tab--active::after { content: ''; position: absolute; bottom: -2px; inset-inline-start: 0; inset-inline-end: 0; height: 2px; background: var(--c-purple); }
        .gift-tab__count { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; border-radius: var(--radius-pill); font-size: 11px; font-weight: var(--font-weight-bold); margin-inline-start: var(--space-2); padding: 0 6px; }
        .gift-tab--active .gift-tab__count { background: var(--c-purple-ll); color: var(--c-purple); }

        .gift-table { width: 100%; border-collapse: collapse; }
        .gift-table th { text-align: start; font-size: var(--font-size-xs); text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--color-text-secondary); padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-border); font-weight: var(--font-weight-medium); }
        .gift-table td { padding: var(--space-4); border-bottom: 1px solid var(--color-border); font-size: var(--font-size-sm); vertical-align: middle; }
        .gift-table tbody tr { transition: background var(--motion-fast); }
        .gift-table tbody tr:hover { background: var(--color-surface-muted); }
        .gift-table tbody tr:last-child td { border-bottom: none; }

        .gift-status { display: inline-flex; align-items: center; gap: 6px; font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); padding: 3px 10px; border-radius: var(--radius-pill); }
        .gift-status--active { background: var(--c-success-50); color: var(--c-success-700); }
        .gift-status--scheduled { background: var(--c-warning-50); color: var(--c-warning-700); }
        .gift-status--expired { background: var(--color-surface-muted); color: var(--color-text-secondary); }
        .gift-status--paused { background: var(--c-danger-50); color: var(--c-danger-700); }

        .usage-bar { display: flex; align-items: center; gap: var(--space-2); }
        .usage-bar__track { flex: 1; height: 6px; background: var(--color-border); border-radius: var(--radius-pill); overflow: hidden; min-width: 60px; }
        .usage-bar__fill { height: 100%; background: var(--c-purple); border-radius: var(--radius-pill); }
        .usage-bar__text { font-size: var(--font-size-xs); color: var(--color-text-secondary); white-space: nowrap; }

        .create-bar { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-5); margin-bottom: var(--space-5); }

        .warn-modal { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; background: rgba(14,14,14,0.5); backdrop-filter: blur(4px); }
        .warn-modal__card { background: var(--color-surface); border-radius: var(--radius-lg); padding: var(--space-8); max-width: 440px; width: 90%; box-shadow: var(--shadow-xl); }
        .warn-modal__icon { font-size: 40px; text-align: center; margin-bottom: var(--space-4); }
        .warn-modal__title { font-family: var(--font-display); font-size: var(--font-size-xl); font-weight: var(--font-weight-semibold); text-align: center; margin-bottom: var(--space-3); }
        .warn-modal__desc { font-size: var(--font-size-sm); color: var(--color-text-secondary); text-align: center; line-height: 1.7; margin-bottom: var(--space-6); }
        .warn-modal__actions { display: flex; gap: var(--space-3); }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__store">
                <div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-3);"><img src="assets/logo.svg" alt="" style="height:28px"><span style="font-size:var(--font-size-sm);color:rgba(255,255,255,0.7);">Member Plus</span></div>
                <div class="sidebar__store-name" id="store-name">—</div>
                <div class="sidebar__trial" id="trial-line">—</div>
            </div>
            <nav class="sidebar__nav">
                <a class="sidebar__link" href="dashboard.html"><span class="icon" aria-hidden="true">📊</span> لوحة التحكم</a>
                <a class="sidebar__link" href="plans.html"><span class="icon" aria-hidden="true">🏷️</span> إعدادات العضوية</a>
                <a class="sidebar__link" href="promotions.html" aria-current="page"><span class="icon" aria-hidden="true">🎁</span> الهدية الشهرية</a>
                <a class="sidebar__link" href="members.html"><span class="icon" aria-hidden="true">👥</span> الأعضاء</a>
                <a class="sidebar__link" href="activity.html"><span class="icon" aria-hidden="true">📋</span> سجل النشاط</a>
                <a class="sidebar__link" href="settings.html"><span class="icon" aria-hidden="true">⚙️</span> الإعدادات</a>
            </nav>
            <div class="sidebar__footer"><button class="sidebar__link" id="logout-btn" type="button"><span class="icon" aria-hidden="true">⎋</span> تسجيل خروج</button></div>
        </aside>
        <div class="sidebar__overlay" id="sidebar-overlay"></div>

        <div class="app-main">
            <header class="app-topbar">
                <div style="display:flex;align-items:center;gap:var(--space-3);"><button class="sidebar__toggle" id="sidebar-toggle" type="button" aria-label="فتح القائمة">☰</button><span class="app-topbar__title">الهدية الشهرية</span></div>
                <button class="btn btn--primary" id="create-btn" type="button" style="font-size:var(--font-size-sm);">+ إنشاء هدية</button>
            </header>

            <main class="container">
                <div id="state-loading"><div class="skeleton skeleton--block" style="height:60px;margin-bottom:var(--space-3)"></div><div class="skeleton skeleton--block" style="height:200px"></div></div>
                <div id="state-error" hidden><div class="empty"><div class="empty__icon">⚠️</div><div class="empty__title">تعذّر التحميل</div><p class="empty__body" id="err-body"></p><button class="btn btn--primary" id="err-retry">إعادة المحاولة</button></div></div>
                <div id="state-empty" hidden><div class="empty"><div class="empty__icon">🎁</div><div class="empty__title">لا توجد هدايا بعد</div><p class="empty__body">أنشئ أول هدية شهرية لأعضاء الباقة الذهبية.</p></div></div>

                <div id="state-data" hidden>
                    <div id="create-form" hidden>
                        <div class="create-bar">
                            <h3 style="font-family:var(--font-display);margin-bottom:var(--space-4);">إنشاء هدية جديدة</h3>
                            <div id="create-conflict" style="display:none;background:var(--c-warning-50);border:1px solid var(--c-gold);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);margin-bottom:var(--space-4);font-size:var(--font-size-sm);color:var(--c-warning-700);"></div>
                            <div class="row">
                                <div class="field"><label for="new-desc">الوصف (عربي)</label><input class="input" id="new-desc" placeholder="خصم 25% على الإكسسوارات"></div>
                                <div class="field"><label for="new-value">القيمة</label><input class="input" type="number" id="new-value" min="1" placeholder="25"></div>
                            </div>
                            <div style="display:flex;gap:var(--space-3);margin-top:var(--space-3);">
                                <button class="btn btn--primary" id="save-new">تفعيل للشهر الحالي</button>
                                <button class="btn btn--secondary" id="schedule-new">جدولة للشهر القادم</button>
                                <button class="btn btn--ghost" id="cancel-new">إلغاء</button>
                            </div>
                        </div>
                    </div>

                    <div class="summary-row" id="summary"></div>

                    <div class="gift-tabs" id="tabs"></div>

                    <div style="overflow-x:auto;">
                        <table class="gift-table">
                            <thead><tr>
                                <th>الشهر</th>
                                <th>الوصف</th>
                                <th>الاستخدام</th>
                                <th>الاسترداد</th>
                                <th>ينتهي</th>
                                <th>الحالة</th>
                                <th></th>
                            </tr></thead>
                            <tbody id="gift-tbody"></tbody>
                        </table>
                    </div>
                    <div class="pg-bar" id="gift-pagination"></div>
                </div>
            </main>
        </div>
    </div>

    <div id="pause-modal" style="display:none;"></div>

    <script src="app.js"></script>
    <script>
        function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'}); }
        MP.requireAuth();

        document.getElementById('sidebar-toggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('is-open'));
        document.getElementById('sidebar-overlay').addEventListener('click', () => document.getElementById('sidebar').classList.remove('is-open'));
        document.getElementById('logout-btn').addEventListener('click', MP.logout);
        document.getElementById('err-retry').addEventListener('click', load);
        document.querySelectorAll('.sidebar__nav a').forEach(a => { a.addEventListener('click', (e) => { const t = MP.getToken(); if (t && !a.href.includes('token=')) { e.preventDefault(); window.location.href = a.href + (a.href.includes('?') ? '&' : '?') + 'token=' + t; } }); });

        function show(w) { ['state-loading','state-error','state-empty','state-data'].forEach(id => { document.getElementById(id).hidden = id !== w; }); }

        const M = {'01':'يناير','02':'فبراير','03':'مارس','04':'أبريل','05':'مايو','06':'يونيو','07':'يوليو','08':'أغسطس','09':'سبتمبر','10':'أكتوبر','11':'نوفمبر','12':'ديسمبر'};
        function ml(m) { const p = m.split('-'); return M[p[1]] + ' ' + p[0]; }

        let currentTab = 'all';

        const gifts = [
            {id:1, month:'2026-04', desc:'خصم 25% على جميع المنتجات', status:'active', eligible:22, used:8, expires:'2026-04-30'},
            {id:2, month:'2026-05', desc:'خصم 50 ر.س على الطلبات فوق 200', status:'scheduled', eligible:22, used:0, expires:'2026-05-31'},
            {id:3, month:'2026-06', desc:'خصم 30% على العطور', status:'scheduled', eligible:22, used:0, expires:'2026-06-30'},
            {id:4, month:'2026-03', desc:'خصم 15% على الإكسسوارات', status:'expired', eligible:18, used:12, expires:'2026-03-31'},
            {id:5, month:'2026-02', desc:'خصم 20% على الكل', status:'expired', eligible:15, used:9, expires:'2026-02-28'},
            {id:6, month:'2026-01', desc:'خصم 10% على الأحذية', status:'expired', eligible:12, used:7, expires:'2026-01-31'},
            {id:7, month:'2025-12', desc:'خصم 35% عرض نهاية السنة', status:'expired', eligible:10, used:8, expires:'2025-12-31'},
            {id:8, month:'2025-11', desc:'خصم 15% على الحقائب', status:'expired', eligible:9, used:5, expires:'2025-11-30'},
            {id:9, month:'2025-10', desc:'خصم 20% على الملابس', status:'expired', eligible:8, used:6, expires:'2025-10-31'},
            {id:10, month:'2025-09', desc:'خصم 10% على المجوهرات', status:'expired', eligible:7, used:3, expires:'2025-09-30'},
        ];

        const pager = MP.Paginator({ perPage: 8, onChange(items) { renderRows(items); } });

        // Create form logic
        document.getElementById('create-btn').addEventListener('click', () => {
            const form = document.getElementById('create-form');
            form.hidden = !form.hidden;
            if (!form.hidden) checkConflict();
        });
        document.getElementById('cancel-new').addEventListener('click', () => { document.getElementById('create-form').hidden = true; });

        function checkConflict() {
            const now = new Date();
            const curMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
            const hasActive = gifts.some(g => g.status === 'active' && g.month === curMonth);
            const el = document.getElementById('create-conflict');
            const saveBtn = document.getElementById('save-new');
            if (hasActive) {
                el.textContent = '⚠️ يوجد بالفعل هدية نشطة لهذا الشهر (' + ml(curMonth) + '). يمكنك جدولة هدية للشهر القادم فقط.';
                el.style.display = 'block';
                saveBtn.disabled = true;
                saveBtn.style.opacity = '0.4';
                saveBtn.style.pointerEvents = 'none';
            } else {
                el.style.display = 'none';
                saveBtn.disabled = false;
                saveBtn.style.opacity = '';
                saveBtn.style.pointerEvents = '';
            }
        }

        document.getElementById('save-new').addEventListener('click', function() {
            const btn = this;
            const desc = document.getElementById('new-desc').value.trim();
            const val = document.getElementById('new-value').value.trim();
            if (!desc || !val) { MP.toast('يرجى تعبئة الوصف والقيمة', 'warning'); return; }
            MP.setLoading(btn, true);
            setTimeout(() => { MP.setLoading(btn, false); MP.toast('تم التفعيل بنجاح', 'success'); document.getElementById('create-form').hidden = true; }, 500);
        });
        document.getElementById('schedule-new').addEventListener('click', function() {
            const btn = this;
            const desc = document.getElementById('new-desc').value.trim();
            const val = document.getElementById('new-value').value.trim();
            if (!desc || !val) { MP.toast('يرجى تعبئة الوصف والقيمة', 'warning'); return; }
            MP.setLoading(btn, true);
            setTimeout(() => { MP.setLoading(btn, false); MP.toast('تم الجدولة بنجاح', 'success'); document.getElementById('create-form').hidden = true; }, 500);
        });

        // Pause gift with warning modal
        function showPauseModal(giftId) {
            const g = gifts.find(x => x.id === giftId);
            if (!g) return;
            document.getElementById('pause-modal').innerHTML = `
                <div class="warn-modal">
                    <div class="warn-modal__card">
                        <div class="warn-modal__icon">⚠️</div>
                        <div class="warn-modal__title">إيقاف الهدية النشطة</div>
                        <div class="warn-modal__desc">
                            أنت على وشك إيقاف هدية <strong>${ml(g.month)}</strong>.<br><br>
                            الأعضاء الذين لم يستخدموا هديتهم بعد لن يتمكنوا من استخدامها.
                            هذا قد يسبب استياء لدى <strong>${g.eligible - g.used} عضو</strong> لم يستردوا هديتهم حتى الآن.
                        </div>
                        <div class="warn-modal__actions">
                            <button class="btn btn--danger" style="flex:1;" onclick="confirmPause(${giftId})">إيقاف الهدية</button>
                            <button class="btn btn--ghost" style="flex:1;" onclick="closePauseModal()">إلغاء</button>
                        </div>
                    </div>
                </div>`;
            document.getElementById('pause-modal').style.display = 'block';
        }
        function closePauseModal() { document.getElementById('pause-modal').style.display = 'none'; }
        function confirmPause(giftId) {
            const g = gifts.find(x => x.id === giftId);
            if (g) g.status = 'paused';
            closePauseModal();
            MP.toast('تم إيقاف الهدية', 'warning');
            renderAll();
        }

        async function load() {
            show('state-loading');
            try {
                const ov = await MP.api('/api/v1/merchant/overview');
                document.getElementById('store-name').textContent = ov.store_name || '—';
                if (ov.status === 'trial' && ov.trial_ends_at) { const d = Math.max(0, Math.ceil((new Date(ov.trial_ends_at) - new Date()) / 86400000)); document.getElementById('trial-line').textContent = d + ' يوم تجربة متبقي'; }
                else { document.getElementById('trial-line').textContent = ov.status === 'active' ? 'نشط' : ov.status; }
                renderAll();
                show('state-data');
            } catch (err) { document.getElementById('err-body').textContent = MP.errorMessage(err, 'ar'); show('state-error'); }
        }

        function renderAll() {
            renderSummary();
            renderTabs();
            applyTab();
        }

        function renderSummary() {
            const active = gifts.filter(g => g.status === 'active').length;
            const scheduled = gifts.filter(g => g.status === 'scheduled').length;
            const totalUsed = gifts.reduce((s, g) => s + g.used, 0);
            const totalEligible = gifts.reduce((s, g) => s + g.eligible, 0);
            const avgRate = totalEligible > 0 ? Math.round((totalUsed / totalEligible) * 100) : 0;
            document.getElementById('summary').innerHTML = `
                <div class="summary-item"><div class="summary-item__value">${active}</div><div class="summary-item__label">نشطة الآن</div></div>
                <div class="summary-item"><div class="summary-item__value">${scheduled}</div><div class="summary-item__label">مجدولة</div></div>
                <div class="summary-item"><div class="summary-item__value">${totalUsed}</div><div class="summary-item__label">استخدام إجمالي</div></div>
                <div class="summary-item"><div class="summary-item__value">${avgRate}%</div><div class="summary-item__label">متوسط الاسترداد</div></div>`;
        }

        function renderTabs() {
            const counts = {all: gifts.length, active: gifts.filter(g=>g.status==='active').length, scheduled: gifts.filter(g=>g.status==='scheduled').length, expired: gifts.filter(g=>g.status==='expired'||g.status==='paused').length};
            const labels = {all:'الكل', active:'النشطة', scheduled:'المجدولة', expired:'المنتهية'};
            let html = '';
            ['all','active','scheduled','expired'].forEach(t => {
                html += `<button class="gift-tab ${t===currentTab?'gift-tab--active':''}" data-tab="${t}">${labels[t]}<span class="gift-tab__count">${counts[t]}</span></button>`;
            });
            document.getElementById('tabs').innerHTML = html;
            document.querySelectorAll('.gift-tab').forEach(tab => {
                tab.addEventListener('click', () => { currentTab = tab.dataset.tab; renderTabs(); applyTab(); });
            });
        }

        function applyTab() {
            let filtered = gifts;
            if (currentTab === 'active') filtered = gifts.filter(g => g.status === 'active');
            else if (currentTab === 'scheduled') filtered = gifts.filter(g => g.status === 'scheduled');
            else if (currentTab === 'expired') filtered = gifts.filter(g => g.status === 'expired' || g.status === 'paused');

            // Sort: newest first
            filtered.sort((a, b) => b.month.localeCompare(a.month));

            pager.setItems(filtered);
            renderRows(pager.getPage());
            pager.render(document.getElementById('gift-pagination'));
        }

        function renderRows(rows) {
            const tbody = document.getElementById('gift-tbody');
            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:var(--space-8);color:var(--color-text-secondary);">لا توجد هدايا في هذا القسم</td></tr>';
                return;
            }

            const statusLabels = {active:'نشطة', scheduled:'مجدولة', expired:'منتهية', paused:'متوقفة'};
            const statusCls = {active:'active', scheduled:'scheduled', expired:'expired', paused:'paused'};

            tbody.innerHTML = rows.map(g => {
                const pct = g.eligible > 0 ? Math.round((g.used / g.eligible) * 100) : 0;
                const canPause = g.status === 'active';
                return `<tr>
                    <td style="white-space:nowrap;font-weight:var(--font-weight-medium);">🎁 ${ml(g.month)}</td>
                    <td>${g.desc}</td>
                    <td><div class="usage-bar"><div class="usage-bar__track"><div class="usage-bar__fill" style="width:${pct}%"></div></div><div class="usage-bar__text">${g.used}/${g.eligible}</div></div></td>
                    <td style="font-weight:var(--font-weight-semibold);color:var(--c-purple);">${pct}%</td>
                    <td style="white-space:nowrap;">${fmtDate(g.expires)}</td>
                    <td><span class="gift-status gift-status--${statusCls[g.status]||'expired'}">${statusLabels[g.status]||g.status}</span></td>
                    <td>${canPause ? '<button class="btn btn--ghost" style="font-size:var(--font-size-xs);padding:2px 10px;color:var(--c-danger-500);" onclick="showPauseModal('+g.id+')">إيقاف</button>' : ''}</td>
                </tr>`;
            }).join('');
        }

        load();
    </script>
</body>
</html>
